name: Daily Garmin Sync

on:
  schedule:
    # Triggers on the UTC hours covering 4am to 10pm to ensure coverage during both GMT and BST
    - cron: '0 4-22 * * *'
  
  workflow_dispatch:
    inputs:
      profile:
        description: 'Select User Profile'
        required: true
        default: 'USER1'
        type: choice
        options:
        - USER1
        - USER2
      start_date:
        description: 'Start Date (YYYY-MM-DD)'
        required: false
      end_date:
        description: 'End Date (YYYY-MM-DD)'
        required: false
      output_type:
        description: 'Output Destination'
        required: true
        default: 'drive'
        type: choice
        options:
        - drive
        - sheets

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Daylight Saving Time Filter
      id: dst-filter
      run: |
        # Only run this check for scheduled cron jobs, allowing manual dispatches to run anytime
        if [ "${{ github.event_name }}" == "schedule" ]; then
          UK_HOUR=$(TZ='Europe/London' date +%H)
          # Execute only if the UK hour is between 05 (5 AM) and 22 (10 PM) inclusive
          if [[ "$UK_HOUR" < "05" || "$UK_HOUR" > "22" ]]; then
            echo "Current UK hour is $UK_HOUR. Exiting early to prevent redundant execution."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
        fi
        echo "should_run=true" >> $GITHUB_OUTPUT

    # ... [Keep the rest of your existing steps starting from "Checkout code"] ...
